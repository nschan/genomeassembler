name: report
description: Create report for nf-core/genomeassembler
keywords:
  - report
  - quarto
tools:
  - quarto:
      description: An open-source scientific and technical publishing system.
      homepage: https://quarto.org/
      documentation: https://quarto.org/docs/reference/
      tool_dev_url: https://github.com/quarto-dev/quarto-cli
      licence: ["MIT"]
      identifier: ""
input:
  - qmdir_files:
      type: path
      description: |
        qmd for reporting
  - funct_files:
      type: path
      description: |
        Functions for reporting
  - script_files:
      type: path
      description: |
        Scripts for reporting
  - fastplong_files:
      type: path
      description: |
        Fastplong json outputs
  - jelly_files:
      type: path
      description: |
        Genomescope outputs
  - quast_files:
      type: path
      description: |
        quast tsv report
  - busco_files:
      type: path
      description: |
        busco short summary
  - meryl_files:
      type: path
      description: |
        merqury plot.log.png files.
  - versions:
      type: val
      description: |
        Collected versions.
  - groups:
      type: val
      description: |
        Sample - group relationshipts
output:
  - report_html:
      - - "report.html":
            type: path
            description: |
              Report html file
        - "report_files/*":
            type: path
            description: |
              Files required to view html report.
  - busco_table:
      - - "reports.csv":
            type: path
            description: |
              Collated busco reports
  - quast_table:
      - - "reports.csv":
            type: path
            description: |
              Collated quast reports
authors:
  - "@nschan"
maintainers:
  - "@nschan"
